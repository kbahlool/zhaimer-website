<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ZHAIMER — Official Trailer</title>
  <meta name="theme-color" content="#050505" />
  <style>
    :root {
      --gold: #f5c451;
      --gold-light: #ffe8a3;
      --black: #050505;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--black);
      color: white;
      font-family: Arial, Helvetica, sans-serif;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 50% 30%, rgba(245,196,81,.12), transparent 36%),
        #050505;
    }

    #trailer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      transition: opacity 1s ease;
    }

    #startOverlay {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(0,0,0,.72);
      z-index: 3;
      text-align: center;
      padding: 24px;
    }

    .start-button,
    .play-button {
      border: 1px solid rgba(255,232,163,.8);
      border-radius: 999px;
      padding: 16px 30px;
      background: linear-gradient(135deg, #8f5b05, #f5c451, #8f5b05);
      color: #111;
      font-weight: 900;
      letter-spacing: 1.4px;
      cursor: pointer;
      box-shadow: 0 0 35px rgba(245,196,81,.35);
      text-decoration: none;
      display: inline-block;
    }

    #endScreen {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 28px;
      opacity: 0;
      pointer-events: none;
      transform: scale(1.03);
      transition: opacity 1.1s ease, transform 1.1s ease;
      background:
        radial-gradient(circle at center, rgba(245,196,81,.18), transparent 38%),
        linear-gradient(180deg, #050505, #0c0903);
    }

    #endScreen.show {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .content {
      max-width: 760px;
      animation: glow 2.4s ease-in-out infinite alternate;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(52px, 12vw, 118px);
      letter-spacing: .09em;
      color: var(--gold);
      text-shadow: 0 0 22px rgba(245,196,81,.45);
    }

    .tagline {
      margin: 0 0 28px;
      font-size: clamp(18px, 3vw, 30px);
      color: #f3ead2;
    }

    .credit {
      margin-top: 28px;
      color: #c8c8c8;
      line-height: 1.7;
      font-size: 15px;
    }

    .url {
      display: block;
      margin-top: 18px;
      color: var(--gold-light);
      overflow-wrap: anywhere;
      font-size: 14px;
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 5px rgba(245,196,81,.12)); }
      to   { filter: drop-shadow(0 0 18px rgba(245,196,81,.28)); }
    }
  </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3S53Z9N918"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-3S53Z9N918');
</script>

</head>
<body>
  <main class="stage">
    <video id="trailer" autoplay muted playsinline preload="auto">
      <source src="video2.mp4" type="video/mp4" />
      Your browser does not support video playback.
    </video>

    <section id="startOverlay">
      <div>
        <h2>Watch the ZHAIMER Trailer</h2>
        <button class="start-button" id="startButton">▶ START VIDEO</button>
      </div>
    </section>

    <section id="endScreen" aria-hidden="true">
      <div class="content">
        <h1>ZHAIMER</h1>
        <p class="tagline">Memory is your greatest weapon.</p>
        <a class="play-button" href="game.html">▶ PLAY ZHAIMER</a>
        <span class="url">kbahlool.github.io/zhaimer-website/game.html</span>
        <div class="credit">
          Created by Khalid Bahlool<br />
          A Zhaimer Labs Production
        </div>
      </div>
    </section>
  </main>

  <script>
    const video = document.getElementById("trailer");
    const endScreen = document.getElementById("endScreen");
    const startOverlay = document.getElementById("startOverlay");
    const startButton = document.getElementById("startButton");

    function showEndScreen() {
      video.style.opacity = "0";
      video.pause();
      endScreen.classList.add("show");
      endScreen.setAttribute("aria-hidden", "false");
    }

    video.addEventListener("ended", showEndScreen);

    video.play().catch(() => {
      startOverlay.style.display = "grid";
    });

    startButton.addEventListener("click", async () => {
      startOverlay.style.display = "none";
      video.muted = false;
      try {
        await video.play();
      } catch (error) {
        startOverlay.style.display = "grid";
      }
    });

    // Tapping the playing video enables sound when permitted by the browser.
    video.addEventListener("click", () => {
      video.muted = !video.muted;
    });
  </script>
</body>
</html>
