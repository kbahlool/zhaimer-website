<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Leaderboard - Zhaimer</title>
<meta name="description" content="Your Zhaimer game stats and history, saved on this device." />
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png" />
<link rel="stylesheet" href="style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="title" style="font-size:24px;letter-spacing:4px;">ZHAIMER</div>
      <div class="tagline">Your stats on this device</div>
    </div>
  </div>

  <div class="setup-card" id="statsCard">
    <h2>Your Stats</h2>
    <div class="stat-grid">
      <div class="stat-box"><div class="num" id="statGames">0</div><div class="lbl">Games Played</div></div>
      <div class="stat-box"><div class="num" id="statWins">0</div><div class="lbl">Wins</div></div>
      <div class="stat-box"><div class="num" id="statBest">–</div><div class="lbl">Best Score</div></div>
    </div>
    <div class="small-note" style="text-align:center;">
      Stats are saved only on this device/browser — there's no account system yet, so they won't follow you elsewhere.
    </div>
  </div>

  <div class="setup-card">
    <h2>Recent Games</h2>
    <div id="historyList"></div>
    <div class="small-note" id="emptyNote" style="display:none;text-align:center;">
      No games recorded yet — go play a round!
    </div>
  </div>

  <div class="actions" style="margin-top:16px;">
    <a href="index.html" class="primary-btn" style="text-decoration:none;display:inline-block;">Back to Game</a>
    <button class="ghost-btn" id="clearBtn" style="border-color:var(--crimson);color:var(--crimson)">Clear Stats</button>
  </div>
</div>

<footer class="site-footer">
  <a href="index.html">Play</a>
  <span>·</span>
  <a href="about.html">About</a>
</footer>

<script>
function safeGet(key){ try{ return localStorage.getItem(key); }catch(e){ return null; } }
function safeSet(key, val){ try{ localStorage.setItem(key, val); }catch(e){} }
function safeRemove(key){ try{ localStorage.removeItem(key); }catch(e){} }

function loadStats(){
  try{
    const raw = safeGet('zhaimer_stats');
    if(!raw) return { gamesPlayed:0, wins:0, bestScore:null, history:[] };
    return JSON.parse(raw);
  }catch(e){ return { gamesPlayed:0, wins:0, bestScore:null, history:[] }; }
}

function render(){
  const stats = loadStats();
  document.getElementById('statGames').textContent = stats.gamesPlayed || 0;
  document.getElementById('statWins').textContent = stats.wins || 0;
  document.getElementById('statBest').textContent = stats.bestScore===null||stats.bestScore===undefined ? '–' : stats.bestScore;

  const list = document.getElementById('historyList');
  const history = stats.history || [];
  if(history.length===0){
    list.innerHTML = '';
    document.getElementById('emptyNote').style.display = 'block';
    return;
  }
  document.getElementById('emptyNote').style.display = 'none';
  list.innerHTML = history.slice(0,20).map(h=>{
    const date = new Date(h.date);
    const dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    return `<div class="history-row">
      <span>${h.won?'🏆':'—'} <span class="${h.won?'win':'loss'}">${h.won?'Won':'Played'}</span> · ${h.mode==='ai'?'vs AI':'Online'} · ${h.opponents} opponent(s)</span>
      <span>${h.score!==null?h.score+' pts':''} <span style="color:var(--muted);font-size:11px;">${dateStr}</span></span>
    </div>`;
  }).join('');
}

document.getElementById('clearBtn').addEventListener('click', ()=>{
  if(confirm('Clear all local stats? This cannot be undone.')){
    safeRemove('zhaimer_stats');
    render();
  }
});

render();
</script>
</body>
</html>
